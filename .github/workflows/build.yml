name: Build & Test

on:
  push:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.0
          use-dotnet: false
          include-templates: true

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install site dependencies
        run: pnpm install
        working-directory: site

      - name: Import project
        run: godot --headless --quit || true

      - name: Export to Web
        run: |
          mkdir -p site/public
          godot --headless --export-release "Web" site/public/game.html

      - name: Build Vite site
        run: pnpm build
        working-directory: site

      - name: Smoke test
        run: |
          test -f site/dist/index.html
          test -f site/dist/game.html
          echo "Artifacts OK"

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: site/dist
          retention-days: 3
